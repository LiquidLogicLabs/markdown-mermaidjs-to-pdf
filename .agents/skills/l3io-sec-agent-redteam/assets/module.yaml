default_selected: false
module_greeting: >
  LiquidLogicLabs Security module is configured!
  Use /l3io-sec-agent-redteam for red team analysis at sprint, epic, or solution scope.
  The agent builds its research cache over time for faster platform best practices lookups.
  Ensure WebSearch is enabled in Claude Code permissions for live platform research.

agents:
