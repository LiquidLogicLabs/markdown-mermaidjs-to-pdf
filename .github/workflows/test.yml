name: Test

on:
  workflow_call:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      # Writable npm cache (fixes act when container runs as non-root via --container-options)
      npm_config_cache: ${{ github.workspace }}/.npm-cache
      # Skip Puppeteer browser download in test job (lint/unit tests only; E2E and Docker use their own)
      PUPPETEER_SKIP_DOWNLOAD: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm test
